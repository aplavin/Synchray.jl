name: CI

on: [push, pull_request]

env:
  SSH_AUTH_SOCK: /tmp/ssh_agent.sock
  JULIA_PKG_SERVER:
  PYTHON:

jobs:
  test:
    timeout-minutes: 40
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        julia-version: ['lts', '1', 'pre']
        os: [ubuntu-latest]
      fail-fast: false
    steps:
      - uses: actions/checkout@v2
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
      - uses: julia-actions/cache@v2
      - run: |
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts
            ssh-agent -a $SSH_AUTH_SOCK > /dev/null
            ssh-add - <<< "${{ secrets.SSH_PRIVATE_KEY }}"
      - run: julia -e 'using Pkg; pkg"registry add General git@github.com:aplavin/MyRegistry.git"'
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  examples:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - run: |
            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts
            ssh-agent -a $SSH_AUTH_SOCK > /dev/null
            ssh-add - <<< "${{ secrets.SSH_PRIVATE_KEY }}"
      - run: julia -e 'using Pkg; pkg"registry add General git@github.com:aplavin/MyRegistry.git"'
      - name: Set dispatch_doctor_mode to error
        run: |
          julia -e 'using Pkg; Pkg.add("Preferences"); using Preferences: set_preferences!; using UUIDs; set_preferences!((UUID("00000000-0000-4000-b000-202512310000"), "Synchray"), "dispatch_doctor_mode" => "error")'
      - name: Set up examples environment
        run: julia --project -e 'using Pkg; Pkg.develop(path=".."); Pkg.instantiate()'
        working-directory: examples
      - name: Generate example images
        run: make images
        working-directory: examples
